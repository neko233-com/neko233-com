name: profile animations

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-animations-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  profile-animations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?palette=github-dark

      - name: Generate 3D contribution profile
        uses: yoshi389111/github-profile-3d-contrib@0.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit generated profile assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-snake*.svg profile-3d-contrib/*.svg
          if git diff --cached --quiet; then
            echo "No generated profile asset changes."
            exit 0
          fi
          git commit -m "chore: update generated profile assets"
          git pull --rebase origin main
          git push origin HEAD:main
