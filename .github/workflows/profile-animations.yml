name: profile animations

on:
  schedule:
    - cron: "23 18 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/profile-animations.yml
      - README.md

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate contribution snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-snake.svg
            assets/github-snake-dark.svg?palette=github-dark

      - name: Commit generated snake
        uses: EndBug/add-and-commit@v9
        with:
          add: assets/github-snake*.svg
          message: "chore: update contribution snake"

  profile-3d:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Generate 3D contribution profile
        uses: yoshi389111/github-profile-3d-contrib@0.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit generated 3D profile
        uses: EndBug/add-and-commit@v9
        with:
          add: "profile-3d-contrib/*.svg"
          message: "chore: update 3d contribution profile"
