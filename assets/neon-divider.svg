<svg width="1000" height="80" viewBox="0 0 1000 80" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated neon divider">
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e7ff"/>
      <stop offset="0.35" stop-color="#7cff6b"/>
      <stop offset="0.68" stop-color="#ffe66d"/>
      <stop offset="1" stop-color="#ff4fd8"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .flow { stroke-dasharray: 100 36; animation: flow 2.6s linear infinite; }
      .dot { animation: blink 1.6s ease-in-out infinite; }
      .d2 { animation-delay: .4s; }
      .d3 { animation-delay: .8s; }
      @keyframes flow { to { stroke-dashoffset: -272; } }
      @keyframes blink { 0%, 100% { opacity: .25; } 50% { opacity: 1; } }
    </style>
  </defs>
  <path class="flow" d="M35 40H965" stroke="url(#line)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <circle class="dot" cx="250" cy="40" r="6" fill="#00e7ff" filter="url(#glow)"/>
  <circle class="dot d2" cx="500" cy="40" r="6" fill="#ffe66d" filter="url(#glow)"/>
  <circle class="dot d3" cx="750" cy="40" r="6" fill="#ff4fd8" filter="url(#glow)"/>
</svg>
