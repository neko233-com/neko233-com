<svg width="1000" height="260" viewBox="0 0 1000 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated radar grid</title>
  <desc id="desc">A dark dashboard radar animation with moving rings and signal points.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#15233a"/>
      <stop offset="1" stop-color="#05070d"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00e7ff" stop-opacity=".95"/>
      <stop offset="1" stop-color="#00e7ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .rotate { animation: spin 5.5s linear infinite; transform-origin: 500px 130px; }
      .pulse1 { animation: pulse 2.4s ease-out infinite; transform-origin: 500px 130px; }
      .pulse2 { animation: pulse 2.4s ease-out infinite .8s; transform-origin: 500px 130px; }
      .pulse3 { animation: pulse 2.4s ease-out infinite 1.6s; transform-origin: 500px 130px; }
      .twinkle { animation: twinkle 1.8s ease-in-out infinite; }
      .delay { animation-delay: .6s; }
      .delay2 { animation-delay: 1.1s; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse { 0% { opacity: .75; transform: scale(.2); } 100% { opacity: 0; transform: scale(1.18); } }
      @keyframes twinkle { 0%, 100% { opacity: .25; } 50% { opacity: 1; } }
    </style>
  </defs>
  <rect width="1000" height="260" rx="18" fill="url(#bg)"/>
  <path d="M60 40H940M60 80H940M60 120H940M60 160H940M60 200H940M100 20V240M180 20V240M260 20V240M340 20V240M420 20V240M500 20V240M580 20V240M660 20V240M740 20V240M820 20V240M900 20V240" stroke="#24354f" opacity=".55"/>
  <circle cx="500" cy="130" r="42" stroke="#2f4b6e"/>
  <circle cx="500" cy="130" r="78" stroke="#2f4b6e"/>
  <circle cx="500" cy="130" r="114" stroke="#2f4b6e"/>
  <circle class="pulse1" cx="500" cy="130" r="105" stroke="#00e7ff" stroke-width="2" filter="url(#glow)"/>
  <circle class="pulse2" cx="500" cy="130" r="105" stroke="#7cff6b" stroke-width="2" filter="url(#glow)"/>
  <circle class="pulse3" cx="500" cy="130" r="105" stroke="#ff4fd8" stroke-width="2" filter="url(#glow)"/>
  <g class="rotate" filter="url(#glow)">
    <path d="M500 130L760 112L500 130Z" stroke="url(#beam)" stroke-width="8" stroke-linecap="round"/>
    <path d="M500 130L737 72L500 130Z" fill="#00e7ff" opacity=".14"/>
  </g>
  <g filter="url(#glow)">
    <circle class="twinkle" cx="425" cy="96" r="5" fill="#00e7ff"/>
    <circle class="twinkle delay" cx="622" cy="165" r="5" fill="#7cff6b"/>
    <circle class="twinkle delay2" cx="545" cy="64" r="5" fill="#ff4fd8"/>
    <circle class="twinkle" cx="356" cy="171" r="4" fill="#ffe66d"/>
    <circle class="twinkle delay2" cx="704" cy="102" r="4" fill="#00e7ff"/>
  </g>
  <text x="72" y="228" fill="#7f91ad" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">live signal board</text>
  <text x="802" y="228" fill="#7f91ad" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">animated telemetry</text>
</svg>
